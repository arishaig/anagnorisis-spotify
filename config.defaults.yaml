spotify_import:
  client_id: null         # Required — Spotify app client ID
  client_secret: null     # Required — Spotify app client secret
  redirect_uri: null      # Required — e.g. https://music.example.com/spotify/callback

  # Fuzzy match threshold (0–100). Lower = more matches but more false positives.
  # 82 is a good starting point; raise to 90+ for stricter matching.
  match_threshold: 82

  # Controls how Spotify-derived ratings interact with existing manual ratings.
  # Options:
  #   never     — only write if the track has no rating yet
  #   if_higher — write if no rating exists or Spotify rating is higher (default)
  #   always    — write whenever Spotify has a rating, regardless of existing value
  overwrite_ratings: if_higher
